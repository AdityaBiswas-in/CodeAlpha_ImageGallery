<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumière — Image Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dhrjq4xgv/image/upload/v1777659796/logo_m4xzsz.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-container">
    <img src="https://res.cloudinary.com/dhrjq4xgv/image/upload/v1777659796/logo_m4xzsz.jpg" alt="Lumiere Logo" class="header-logo">
    <div class="logo">Lumi<span>ère</span></div>
  </div>
  <div class="header-count" id="count-display">264 PHOTOGRAPHS</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">Visual<br><em>Archive</em></h1>
  <p class="hero-sub">A curated collection of moments — <a href="#" class="hero-link" data-filter="nature">nature</a>, <a href="#" class="hero-link" data-filter="architecture">architecture</a>, <a href="#" class="hero-link" data-filter="urban">urban life</a>, and <a href="#" class="hero-link" data-filter="abstract">abstract forms</a>.</p>
</section>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filter by</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="architecture">Architecture</button>
  <button class="filter-btn" data-filter="urban">Urban</button>
  <button class="filter-btn" data-filter="abstract">Abstract</button>
  <button class="filter-btn" data-filter="people">People</button>
</div>

<!-- GALLERY -->
<div class="gallery-wrap">
  <div class="gallery-grid" id="gallery"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lb-backdrop" id="lb-backdrop"></div>

  <button class="lb-nav" id="lb-prev" aria-label="Previous">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="lb-nav" id="lb-next" aria-label="Next">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="lb-close" id="lb-close" aria-label="Close">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>

  <div class="lb-container">
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="" />
    </div>

    <!-- CSS FILTER BUTTONS -->
    <div class="lb-filters">
      <button class="lbf-btn active" data-css-filter="none">Original</button>
      <button class="lbf-btn" data-css-filter="grayscale(100%)">B&W</button>
      <button class="lbf-btn" data-css-filter="sepia(80%)">Sepia</button>
      <button class="lbf-btn" data-css-filter="saturate(200%) hue-rotate(20deg)">Vivid</button>
      <button class="lbf-btn" data-css-filter="contrast(130%) brightness(0.9)">Drama</button>
      <button class="lbf-btn" data-css-filter="invert(100%)">Invert</button>
    </div>

    <div class="lb-info">
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-meta" id="lb-meta"></div>
      <div class="lb-counter" id="lb-counter"></div>
    </div>

    <div class="lb-thumbs" id="lb-thumbs"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span>© 2026 Lumière Archive</span>
  <span>Built by Aditya Biswas</span>
</footer>

<script src="script.js"></script>
</body>
</html>
